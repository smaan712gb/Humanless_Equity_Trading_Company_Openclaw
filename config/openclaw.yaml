# OpenClaw Gateway Configuration
# The central nervous system — routes messages, manages sessions, coordinates agents.

gateway:
  host: "0.0.0.0"
  port: 3000
  mode: production
  log_level: info

# Default LLM provider for all agents
default_provider:
  name: deepseek
  model: deepseek-chat
  api_base: "https://api.deepseek.com/v1"
  # API key loaded from environment: DEEPSEEK_API_KEY
  max_tokens: 8192
  temperature: 0.3

# Reasoning model for agents that need deep thinking
reasoning_provider:
  name: deepseek-reasoner
  model: deepseek-reasoner
  api_base: "https://api.deepseek.com/v1"
  max_tokens: 16384
  temperature: 0.1

# Optional specialist (code review, debugging only)
specialist_provider:
  name: claude
  model: claude-sonnet-4-6
  api_base: "https://api.anthropic.com/v1"
  # API key loaded from environment: ANTHROPIC_API_KEY
  max_tokens: 8192
  temperature: 0.2
  usage: "code-review-only"

# Agent-to-model mapping
agent_models:
  ceo: deepseek-reasoner
  scout: deepseek-chat
  analyst: deepseek-reasoner
  strategist: deepseek-reasoner
  executor: deepseek-chat
  position_manager: deepseek-reasoner
  compliance: deepseek-reasoner
  auditor: deepseek-reasoner  # temperature override: 0

# Memory configuration
memory:
  daily_diary_path: "./memory/"
  diary_format: "YYYY-MM-DD.md"
  session_transcripts: "./sessions/"
  transcript_format: "jsonl"
  vectordb: sqlite
  vectordb_path: "./data/memory.db"
  auto_flush: true
  flush_token_threshold: 100000

# Heartbeat configuration
heartbeat:
  enabled: true
  intervals:
    ceo: 1800        # 30 minutes
    scout: 900       # 15 minutes
    analyst: 900     # 15 minutes
    strategist: 300  # 5 minutes
    executor: 60     # 1 minute
    position_manager: 60  # 1 minute
    compliance: 300  # 5 minutes
    auditor: 86400   # daily

# Session management
sessions:
  max_concurrent_agents: 8
  session_timeout_minutes: 720  # 12-hour trading day
  auto_save_interval_seconds: 300

# Cron jobs
cron:
  pre_market_scan:
    schedule: "0 8 * * 1-5"  # 08:00 ET weekdays
    agent: scout
    task: "Run pre-market universe scan"

  market_open_prep:
    schedule: "25 9 * * 1-5"  # 09:25 ET weekdays
    agent: executor
    task: "Verify IBKR connection and account state"

  midday_review:
    schedule: "0 12 * * 1-5"  # 12:00 ET weekdays
    agent: ceo
    task: "Midday P&L review and strategy assessment"

  wind_down:
    schedule: "30 15 * * 1-5"  # 15:30 ET weekdays
    agent: position_manager
    task: "Begin orderly position wind-down"

  force_close:
    schedule: "50 15 * * 1-5"  # 15:50 ET weekdays
    agent: position_manager
    task: "Force close all remaining positions"

  daily_audit:
    schedule: "0 16 * * 1-5"  # 16:00 ET weekdays
    agent: auditor
    task: "Run Attacker-Defender-Judge audit on today's session"

  rsi_window:
    schedule: "0 18 * * 1-5"  # 18:00 ET weekdays
    agent: auditor
    task: "Process RSI proposals and run backtests"

# Sandboxing
sandbox:
  enabled: true
  network_access:
    allowed:
      - "api.deepseek.com"
      - "api.anthropic.com"
      - "127.0.0.1:7496"  # IBKR live
      - "127.0.0.1:7497"  # IBKR paper
    blocked: ["*"]  # block everything else by default
  file_access:
    writable: ["./memory/", "./sessions/", "./data/"]
    read_only: ["./agents/", "./skills/", "./paperclip/", "./config/"]
