# Paperclip Org Chart — Humanless Trading Operations
# This file defines the organizational hierarchy, reporting lines, and approval chains.

company:
  name: "Humanless Trading Operations"
  mission: "Generate $20,000 daily profit through autonomous AI-driven high-beta equity trading"
  founded: "2026-04-03"

board:
  - role: founder
    type: human
    authority: ultimate
    responsibilities:
      - strategic direction
      - capital allocation
      - emergency kill switch
      - quarterly performance review

agents:
  ceo:
    name: "CEO"
    model: deepseek-reasoner
    reports_to: founder
    authority: high
    direct_reports: [trader_desk, compliance, auditor]
    responsibilities:
      - daily P&L oversight
      - strategy approval for new tickers
      - escalation handling from compliance
      - weekly performance synthesis
    heartbeat: 30m
    approval_required_for:
      - new strategy deployment
      - position size > 10% of portfolio
      - adding new ticker to permanent watchlist

  trader_desk:
    name: "Trading Desk"
    reports_to: ceo
    agents:
      scout:
        name: "Scout"
        model: deepseek-chat
        reports_to: ceo
        authority: low
        responsibilities:
          - market scanning and ticker discovery
          - pre-open sentiment analysis
          - factor mining via RD-Agent
        tools: [ibkr-screener, news-sentiment, factor-mining]
        heartbeat: 15m

      analyst:
        name: "Analyst"
        model: deepseek-reasoner
        reports_to: ceo
        authority: low
        responsibilities:
          - deep research on scout leads
          - SEC filing analysis (10-K, 10-Q, earnings)
          - technical and fundamental scoring
        tools: [news-sentiment, factor-mining]
        heartbeat: 15m

      strategist:
        name: "Strategist"
        model: deepseek-reasoner
        reports_to: ceo
        authority: medium
        responsibilities:
          - entry/exit decision making
          - position sizing (Kelly Criterion)
          - strategy selection per ticker
          - real-time P&L-based adjustments
        tools: [ibkr-execution, risk-gatekeeper, position-monitor]
        heartbeat: 5m

      executor:
        name: "Executor"
        model: deepseek-chat
        reports_to: strategist
        authority: medium
        responsibilities:
          - order placement via ib_async
          - bracket order management
          - fill quality monitoring
          - slippage tracking
        tools: [ibkr-execution, risk-gatekeeper]
        heartbeat: 1m

      position_manager:
        name: "Position Manager"
        model: deepseek-reasoner
        reports_to: strategist
        authority: medium
        responsibilities:
          - real-time open position monitoring
          - dynamic stop-loss and take-profit adjustment
          - exit decision making (partial and full closes)
          - P&L tracking per position and aggregate
          - EOD forced liquidation if targets met or breached
        tools: [ibkr-execution, position-monitor, risk-gatekeeper]
        heartbeat: 1m

  compliance:
    name: "Compliance Officer"
    model: deepseek-reasoner
    reports_to: ceo
    authority: high
    responsibilities:
      - pre-trade rule validation
      - pattern day trader (PDT) compliance
      - wash sale monitoring
      - regulatory limit enforcement
    tools: [risk-gatekeeper, position-monitor]
    heartbeat: 5m
    veto_power: true

  auditor:
    name: "Auditor"
    model: deepseek-reasoner
    reports_to: founder
    authority: high
    responsibilities:
      - post-session trade review (Attacker-Defender-Judge)
      - behavioral drift detection
      - RSI proposal validation
      - daily audit report generation
    tools: [position-monitor]
    heartbeat: daily
    temperature: 0  # deterministic evaluation

# Approval Chains
approval_chains:
  new_position:
    flow: [scout, analyst, strategist, compliance, executor]
    timeout: 60s
    fallback: skip_trade

  close_position:
    flow: [position_manager, risk-gatekeeper]
    timeout: 10s
    fallback: market_close_immediate

  emergency_liquidation:
    flow: [risk-gatekeeper]
    timeout: 0s
    fallback: force_close_all

  strategy_change:
    flow: [strategist, compliance, ceo]
    timeout: 300s
    fallback: reject
