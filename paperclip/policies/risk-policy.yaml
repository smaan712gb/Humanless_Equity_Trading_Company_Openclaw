# Risk Management Policy — Enforced by Risk Gatekeeper Skill
# These limits are HARD — the LLM cannot override them.

position_limits:
  max_single_position_pct: 15        # % of portfolio in one ticker
  max_sector_exposure_pct: 30        # % of portfolio in one sector
  max_concurrent_positions: 8        # total open positions at any time
  max_position_value_usd: 100000     # per position dollar cap
  min_position_value_usd: 5000       # don't waste execution on tiny positions

loss_limits:
  daily_max_drawdown_pct: 2.0        # -2% → full shutdown
  per_trade_max_loss_pct: 0.5        # -0.5% of portfolio per trade
  per_trade_max_loss_usd: 2500       # hard dollar stop per trade
  consecutive_loss_cooldown: 3       # after 3 consecutive losses, pause 30 min
  weekly_max_drawdown_pct: 5.0       # -5% week → reduce to Quarter Kelly

profit_targets:
  daily_profit_target_usd: 20000
  action_on_target_hit: reduce_size  # scale down to 25% size after target
  action_on_150pct_target: stop      # full stop at $30K (protect gains)

execution_limits:
  max_trades_per_day: 40
  max_trades_per_hour: 10
  min_time_between_trades_sec: 30    # prevent rapid-fire loops
  max_order_size_shares: 5000
  banned_order_types: [market_on_close_large]

margin_rules:
  max_margin_utilization: 0.60
  margin_call_action: liquidate_worst_performer
  overnight_margin_max: 0.30         # reduce exposure into close

circuit_breakers:
  vix_above_35: reduce_all_50pct
  spy_drop_2pct_intraday: halt_new_entries
  account_equity_below_200k: full_shutdown
  api_disconnect_seconds: 30         # if disconnected 30s, flatten all

high_beta_specific:
  # These stocks move 2-4x the market — tighter controls
  max_hold_time_minutes: 120         # no bagholding high-beta > 2 hours
  force_stop_loss: true              # every position MUST have a stop
  stop_loss_type: trailing           # default trailing stop
  trailing_stop_pct: 1.5             # 1.5% trailing on high-beta
  take_profit_ratio: 2.0             # 2:1 reward-to-risk minimum
