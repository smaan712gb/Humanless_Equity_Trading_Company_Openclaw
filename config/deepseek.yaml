# DeepSeek Model Configuration
# Primary cognitive engine for all agents.

models:
  deepseek-chat:
    description: "Fast execution model — for Scout, Executor, and routine tasks"
    endpoint: "https://api.deepseek.com/v1/chat/completions"
    model_id: "deepseek-chat"
    context_window: 131072  # 128K tokens
    max_output_tokens: 8192
    supports_tools: true
    supports_thinking: true
    cost_per_million_input: 0.27
    cost_per_million_output: 0.40
    typical_latency_ms: 500
    temperature_default: 0.3

  deepseek-reasoner:
    description: "Deep reasoning model — for CEO, Analyst, Strategist, Compliance, Auditor"
    endpoint: "https://api.deepseek.com/v1/chat/completions"
    model_id: "deepseek-reasoner"
    context_window: 65536   # 64K tokens
    max_output_tokens: 16384
    supports_tools: true
    supports_thinking: true
    thinking_in_tool_use: true
    cost_per_million_input: 0.55
    cost_per_million_output: 2.19
    typical_latency_ms: 2000
    temperature_default: 0.1

# API Configuration
api:
  # Key loaded from environment variable: DEEPSEEK_API_KEY
  key_env_var: "DEEPSEEK_API_KEY"
  timeout_seconds: 60
  max_retries: 3
  retry_delay_seconds: 2
  rate_limit_rpm: 500  # requests per minute

# Token Budget (daily)
token_budget:
  daily_max_input_tokens: 50000000   # 50M input tokens
  daily_max_output_tokens: 10000000  # 10M output tokens
  alert_at_pct: 80
  action_on_limit: "reduce_to_essential_agents"
  essential_agents: [executor, position_manager, risk_gatekeeper]

# Model Selection Logic
routing:
  # Agents that MUST use reasoner (complex decision-making)
  require_reasoner:
    - ceo
    - analyst
    - strategist
    - position_manager
    - compliance
    - auditor

  # Agents that use chat (speed-optimized)
  use_chat:
    - scout
    - executor

  # Fallback: if reasoner is unavailable, can these agents use chat?
  reasoner_fallback_to_chat:
    allowed: [analyst, compliance]  # degraded but functional
    blocked: [ceo, strategist, position_manager, auditor]  # too critical
